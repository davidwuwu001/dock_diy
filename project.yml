name: DockDIY
options:
  bundleIdPrefix: com.dockdiy
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Release

targets:
  DockDIY:
    type: application
    platform: macOS
    sources:
      - DockDIY
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dockdiy.app
        INFOPLIST_FILE: DockDIY/Info.plist
        CODE_SIGN_ENTITLEMENTS: DockDIY/DockDIY.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        PRODUCT_NAME: DockDIY
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
    dependencies: []

  DockDIYTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - DockDIYTests
    dependencies:
      - target: DockDIY
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dockdiy.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
